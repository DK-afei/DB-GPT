# To run current docker compose file, you should prepare the silliconflow api key in your environment.
# SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY} docker compose up -d
services:
  # Optional: Dameng(DM8) database for business datasource tests
  # After starting, when creating a DM datasource in DB-GPT UI/API, use:
  #   host: dameng
  #   port: 5236
  dameng:
    image: xuxuclassmate/dameng
    container_name: dbgpt-dameng
    privileged: true
    environment:
      - DM_INI_ENCODING=UTF-8
      - DM_SYSDBA_PASSWORD=SYSDBA001
      - DM_PAGE_SIZE=16
      - DM_EXTENT_SIZE=32
      - DM_CHARSET=1
    ports:
      - 5237:5236
    restart: unless-stopped
    networks:
      - dbgptnet
    healthcheck:
      test: ["CMD", "/dm8/bin/disql", "SYSDBA/SYSDBA001@localhost:5236", "-e", "SELECT 1;"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db:
    image: mysql/mysql-server
    environment:
      MYSQL_USER: 'user'
      MYSQL_PASSWORD: 'password'
      MYSQL_ROOT_PASSWORD: 'aa123456'
    ports:
      - 3307:3306
    volumes:
      - dbgpt-myql-db:/var/lib/mysql
      - ./docker/examples/my.cnf:/etc/my.cnf
      - ./docker/examples/sqls:/docker-entrypoint-initdb.d
      - ./assets/schema/dbgpt.sql:/docker-entrypoint-initdb.d/dbgpt.sql
    restart: unless-stopped
    networks:
      - dbgptnet
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
  webserver:
    build:
      context: .
      dockerfile: Dockerfile.webserver-dm
    image: dbgpt-openai-dm:local
    command: >
      sh -c "
      dbgpt start webserver --config /app/configs/dbgpt-proxy-siliconflow-mysql.toml
      "
    environment:
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - MYSQL_PASSWORD=aa123456
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=dbgpt
      - MYSQL_USER=root
    volumes:
      - ./configs:/app/configs
      - ./packages:/app/packages
      - /data:/data
      # May be you can mount your models to container
      - /data/models:/app/models
      - dbgpt-data:/app/pilot/data
      - dbgpt-message:/app/pilot/message
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 5670:5670/tcp
    # webserver may be failed, it must wait all sqls in /docker-entrypoint-initdb.d execute finish.
    restart: unless-stopped
    networks:
      - dbgptnet
    ipc: host
volumes:
  dbgpt-myql-db:
  dbgpt-data:
  dbgpt-message:
  dbgpt-alembic-versions:
networks:
  dbgptnet:
    driver: bridge
    name: dbgptnet